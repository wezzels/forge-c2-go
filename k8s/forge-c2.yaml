# FORGE-C2 Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-c2
  labels:
    app: forge-c2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge-c2
  template:
    metadata:
      labels:
        app: forge-c2
    spec:
      containers:
      - name: forge-c2
        image: forge-c2:latest
        ports:
        - containerPort: 8080
        - containerPort: 9090
        env:
        - name: FORGE_LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forge-c2
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  - port: 9090
    targetPort: 9090
  selector:
    app: forge-c2
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: forge-c2-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: forge-c2
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
