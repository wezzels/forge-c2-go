---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-c2-config
  namespace: forge-c2
  labels:
    app: forge-c2
data:
  log_level: "info"
  kafka_brokers: "kafka:9092"
  jreap_enabled: "true"
  dis_enabled: "true"
  hla_enabled: "true"
  tena_enabled: "true"
  mdpa_enabled: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: forge-c2-tls
  namespace: forge-c2
  labels:
    app: forge-c2
type: kubernetes.io/tls
data:
  # Base64 encoded cert and key (replace with real values in production)
  # Generated via: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=forge-c2"
  tls.crt: |
    LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCk1JSUJrVENDQVRlZ0F3SUJBZ0lKQUt4cGkyNk1iS
    # ... (placeholder - generate real cert in production)
  tls.key: |
    LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCnBsYXYt
    # ... (placeholder - generate real cert in production)
---
apiVersion: v1
kind: Secret
metadata:
  name: forge-c2-auth
  namespace: forge-c2
  labels:
    app: forge-c2
type: Opaque
data:
  # Base64 encoded secrets (replace with real values in production)
  # Kafka: echo -n "kafka-password" | base64
  kafka_password: a2Fma2EtcGFzc3dvcmQ=
  # API key: echo -n "forge-api-key" | base64
  api_key: Zm9yZ2UtYXBpLWtleQ==
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-c2
  namespace: forge-c2
  labels:
    app: forge-c2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forge-c2
  namespace: forge-c2
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forge-c2
  namespace: forge-c2
subjects:
- kind: ServiceAccount
  name: forge-c2
  namespace: forge-c2
roleRef:
  kind: Role
  name: forge-c2
  apiGroup: rbac.authorization.k8s.io
