# Kind cluster configuration for FORGE-C2
# Usage: kind create cluster --config k8s/kind-config.yaml
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: forge-c2
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  disableDefaultCNI: false
  kubeProxyMode: "iptables"
  dnsDomain: "cluster.local"
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
        eviction-hard: "memory.available<100Mi"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  extraMounts:
  - hostPath: /dev/mapper
    containerPath: /dev/mapper
    readOnly: true
- role: worker
  labels:
    node.kubernetes.io/gpu: "true"
- role: worker
  labels:
    node.kubernetes.io/storage: "fast"
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kind-writer
rules:
- apiGroups: ["kind.x-k8s.io"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: kind-writer-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
roleRef:
  kind: Role
  name: kind-writer
  apiGroup: rbac.authorization.k8s.io
