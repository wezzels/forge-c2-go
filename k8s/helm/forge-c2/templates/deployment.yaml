apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "forge-c2.fullname" . }}
  labels:
    {{- include "forge-c2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "forge-c2.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forge-c2.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
        - name: metrics
          containerPort: 9090
        env:
        - name: FORGE_LOG_LEVEL
          value: {{ .Values.config.logLevel | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
        readinessProbe:
          httpGet:
            path: /health
            port: http
