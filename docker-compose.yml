version: '3.8'

services:
  forge-c2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-1.0.0}
        COMMIT: ${COMMIT:-dev}
    image: ghcr.io/stsgym/forge-c2:latest
    container_name: forge-c2
    ports:
      - "8080:8080"       # HTTP API + WebSocket
      - "5000:5000/udp"   # JREAP UDP
      - "5001:5001"        # JREAP TCP
      - "3000:3000/udp"   # DIS
    environment:
      - FORGE_C2_PORT=8080
      - FORGE_C2_MODE=serve
      - KAFKA_BROKER=${KAFKA_BROKER:-kafka:9092}
      - C2BMC_URL=${C2BMC_URL:-http://c2bmc:5016}
      - SECURITY_ALLOWED_ORIGINS=${SECURITY_ALLOWED_ORIGINS:-}
      - SECURITY_RATE_LIMIT=${SECURITY_RATE_LIMIT:-600}
      - SECURITY_RATE_BURST=${SECURITY_RATE_BURST:-50}
      - SECURITY_CSRF_KEY=${CSRF_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - forge-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: forge-c2-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3FEZNTclFc2Q0AOE6QQ
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - forge-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: forge-c2-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/alertmanager/prometheus-rules.yml:/etc/prometheus/rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - forge-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: forge-c2-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./deploy/grafana/forge-c2.json:/etc/grafana/provisioning/dashboards/forge-c2.json
      - grafana-data:/var/lib/grafana
    networks:
      - forge-net
    depends_on:
      - prometheus

networks:
  forge-net:
    driver: bridge

volumes:
  kafka-data:
  prometheus-data:
  grafana-data: