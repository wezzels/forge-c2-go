# HAProxy configuration for FORGE-C2
# Place behind forge-c2 instances for load balancing

global
    maxconn 4096
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout tunnel 3600s
    retries 3
    option redispatch

# Stats endpoint
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

# HTTP API + WebSocket
frontend forge-c2-http
    bind *:8080

    # Health check routing
    acl is_health path /health /ready /metrics
    use_backend forge-c2-health if is_health

    # WebSocket upgrade
    acl is_ws hdr(Upgrade) -i websocket
    use_backend forge-c2-ws if is_ws

    # Default API backend
    default_backend forge-c2-api

backend forge-c2-api
    balance roundrobin
    option httpchk GET /health
    server forge-c2-1 forge-c2:8080 check inter 5s fall 3 rise 2
    server forge-c2-2 forge-c2:8080 check inter 5s fall 3 rise 2 backup

backend forge-c2-health
    balance roundrobin
    option httpchk GET /health
    server forge-c2-1 forge-c2:8080 check inter 5s

backend forge-c2-ws
    balance leastconn
    timeout server 3600s
    option httpchk GET /health
    server forge-c2-1 forge-c2:8080 check inter 5s
    server forge-c2-2 forge-c2:8080 check inter 5s backup