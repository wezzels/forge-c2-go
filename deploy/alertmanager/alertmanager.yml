global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@stsgym.com'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'forge-c2-default'
  routes:
    - match:
        severity: critical
      receiver: 'forge-c2-critical'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'forge-c2-warning'
      repeat_interval: 6h

receivers:
  - name: 'forge-c2-default'
    webhook_configs:
      - url: 'http://forge-c2:8080/api/alerts'
        send_resolved: true

  - name: 'forge-c2-critical'
    email_configs:
      - to: 'wlrobbi@stsgym.com'
        headers:
          Subject: '[CRITICAL] FORGE-C2 {{ .GroupLabels.alertname }}'

  - name: 'forge-c2-warning'
    email_configs:
      - to: 'wlrobbi@stsgym.com'
        headers:
          Subject: '[WARNING] FORGE-C2 {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']