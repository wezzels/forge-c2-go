apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-c2
  namespace: gms
  labels:
    app: forge-c2
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge-c2
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: forge-c2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: forge-c2
          image: forge-c2:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 5000
              name: jreap-udp
              protocol: UDP
            - containerPort: 5001
              name: jreap-tcp
              protocol: TCP
            - containerPort: 3000
              name: dis
              protocol: UDP
          envFrom:
            - configMapRef:
                name: forge-c2-config
            - secretRef:
                name: forge-c2-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]